name: Generate Snake Grid

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake grid (cyan accent theme)
        uses: Platane/snk@v3
        with:
          github_user_name: Kronos279
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          # Custom cyan/blue palette matching site accent (#4fc3f7)
          color_snake: "#4fc3f7"
          color_dots: "#0c1a3a,#123a6b,#1a5a9b,#2f8fd0,#4fc3f7"

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
